version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuro-rag-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data   # persist FAISS index + articles JSON
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: neuro-rag-frontend
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

volumes:
  data:
